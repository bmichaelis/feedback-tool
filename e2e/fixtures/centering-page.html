<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Centering Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /*
     * Replicates simple-vid's root layout.tsx:
     *   <body className="min-h-full flex flex-col">
     */
    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 64px;
      background: #111111;
      display: flex;
      align-items: center;
      padding: 0 24px;
      color: #ffffff;
      font-family: sans-serif;
      font-size: 18px;
    }

    /*
     * Replicates the <div className="flex-1"> wrapper in root layout.tsx.
     * display:block is the computed value — this is the key container whose
     * block-level layout causes Chrome to report marginLeft: "0px" for
     * centered children using margin:auto + max-width.
     */
    .flex-1 {
      flex: 1;
      display: block;
    }

    /*
     * Replicates simple-vid's /projects page:
     *   <main className="mx-auto w-full max-w-[1080px] ...">
     * Using max-width: 600px so margins are exactly 300px each side at 1200px viewport.
     */
    main {
      margin-left: auto;
      margin-right: auto;
      width: 100%;
      max-width: 600px;
      padding: 40px 20px;
    }

    /*
     * Blue block inside main. Viewport is 1200px, main is 600px centered:
     *   margin = (1200 - 600) / 2 = 300px
     * With 20px horizontal padding, content spans x=320 to x=880.
     * At y=150 (64px header + 40px padding + 46px into block):
     *   x=50  → body background (white)   — if centered
     *   x=600 → content block (blue)      — if centered
     *   x=1150 → body background (white)  — if centered
     * If broken (left-aligned): x=50 would show blue, x=600 would show white.
     */
    .content-block {
      background: #2563eb;
      height: 300px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>Test Site</header>
  <div class="flex-1">
    <main>
      <div class="content-block" id="centered-block"></div>
    </main>
  </div>
</body>
</html>
